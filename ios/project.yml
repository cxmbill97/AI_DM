name: AIDungeonMaster
options:
  bundleIdPrefix: com.aidm
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

targets:
  AIDungeonMaster:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AIDungeonMaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aidm.AIDungeonMaster
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: AIDungeonMaster/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: AIDungeonMaster/AIDungeonMaster.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
